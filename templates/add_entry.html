<!DOCTYPE html>
<html>
<head>
    <title>Add Entry - Wellness Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add Daily Entry</h2>
        <form method="POST">
            <label>Date:</label>
            <input type="date" name="entry_date" required><br>
            <label>Water (L):</label>
            <input type="number" step="0.1" name="water" required><br>
            <label>Sleep (Hrs):</label>
            <input type="number" step="0.1" name="sleep" required><br>
            <label>Steps:</label>
            <input type="number" name="steps" required><br>
            <button type="submit">Add</button>
        </form>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
