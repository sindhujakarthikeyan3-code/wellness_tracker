<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wellness Tracker | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
font-family:'Segoe UI', sans-serif;
background:url("https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.login-container{
position:relative;
z-index:2;
}

.login-card{
width:380px;
padding:40px;
background:rgba(255,255,255,0.95);
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.title{
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;
}

.btn-primary{
background:#4facfe;
border:none;
}

.btn-primary:hover{
background:#3c8ce7;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="login-container">

<div class="login-card">

<h3 class="title">Wellness Tracker</h3>

<p class="subtitle">Track your health and stay fit every day</p>

<form action="/login" method="POST">

<input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

</form>

<br>

<p class="text-center">
New user? <a href="/register_page">Create Account</a>
</p>

</div>

</div>

</body>

</html>
