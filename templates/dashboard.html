<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Tracker | Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:'Segoe UI', sans-serif;background:#f5f5f5;margin:0;padding:0;}
.navbar{background:#4facfe;color:white;padding:10px;}
.container{padding:20px;}
</style>
</head>
<body>
<div class="navbar">
<h2>Wellness Tracker Dashboard</h2>
<a href="/logout" style="color:white;float:right;">Logout</a>
</div>

<div class="container">
<h4>Weight Tracker</h4>
<canvas id="weightChart" width="400" height="150"></canvas>
</div>

<script>
let weightData = {{ weights | tojson | safe }};
const ctx = document.getElementById('weightChart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: weightData.map((_, i) => i+1),
        datasets: [{
            label: 'Weight (kg)',
            data: weightData,
            borderColor: 'rgba(75, 192, 192, 1)',
            backgroundColor: 'rgba(75, 192, 192, 0.2)',
            tension: 0.4
        }]
    },
    options: {
        responsive: true,
        scales: { y: { beginAtZero: true } }
    }
});
</script>
</body>
</html>
