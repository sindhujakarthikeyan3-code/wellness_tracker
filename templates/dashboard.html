<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Tracker Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f5f7fa;
    color: #333;
}

.container {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #1e1e2f;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 25px;
}

/* Professional card style */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    padding: 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.card h2 {
    margin-bottom: 15px;
    font-weight: 600;
    color: #1e1e2f;
    display: flex;
    align-items: center;
}

.card h2 img {
    height: 30px;
    margin-right: 10px;
}

input, button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 10px;
    width: 90%;
    font-size: 16px;
}

button {
    background: linear-gradient(90deg, #00c9a7, #00a389);
    color: white;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s ease;
}

button:hover {
    background: linear-gradient(90deg, #00a389, #008c7c);
}

canvas {
    margin-top: 15px;
    border-radius: 15px;
    background: #fafafa;
    padding: 15px;
}

/* Section content */
p {
    margin-top: 10px;
    line-height: 1.6;
    text-align: left;
}

</style>
</head>

<body>
<div class="container">
    <h1>💪 Wellness Tracker Dashboard</h1>

    <div class="grid">

        <!-- Weight Tracker -->
        <div class="card">
            <h2><img src="https://img.icons8.com/ios-filled/50/000000/weight.png"/>Weight Tracker</h2>
            <input type="number" id="weight" placeholder="Enter weight (kg)">
            <button onclick="addWeight()">Add Weight</button>
            <canvas id="weightChart" height="250"></canvas>
        </div>

        <!-- Calorie Prediction -->
        <div class="card">
            <h2><img src="https://img.icons8.com/ios-filled/50/000000/fire-element.png"/>Calorie Prediction</h2>
            <input type="number" id="age" placeholder="Age">
            <input type="number" id="height" placeholder="Height (cm)">
            <input type="number" id="weightCal" placeholder="Weight (kg)">
            <button onclick="calculateCalories()">Calculate</button>
            <p id="calorieResult">Daily Calories Needed: -</p>
        </div>

        <!-- Diet Recommendation -->
        <div class="card">
            <h2><img src="https://img.icons8.com/ios-filled/50/000000/salad.png"/>Diet Recommendation</h2>
            <p id="dietPlan">Enter details to get diet plan</p>
        </div>

        <!-- BMI & Health Risk -->
        <div class="card">
            <h2><img src="https://img.icons8.com/ios-filled/50/000000/heart-health.png"/>BMI & Health Risk</h2>
            <input type="number" id="weightBMI" placeholder="Weight (kg)">
            <input type="number" id="heightBMI" placeholder="Height (m)">
            <button onclick="calculateBMI()">Calculate BMI & Risk</button>
            <p id="bmiResult">BMI: -</p>
            <p id="riskResult">Health Risk: -</p>
        </div>

    </div>
</div>

<script>
let chart;

// Add weight
function addWeight() {
    let weight = document.getElementById("weight").value;
    fetch("/add_weight", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({weight: weight})
    }).then(() => loadWeights());
}

// Load weights
function loadWeights() {
    fetch("/get_weights")
    .then(res => res.json())
    .then(data => {
        let weights = data;
        let labels = data.map((_, i) => i + 1);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("weightChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Weight Progress (kg)",
                    data: weights,
                    borderWidth: 3,
                    borderColor: "#00c9a7",
                    backgroundColor: "rgba(0,201,167,0.1)",
                    tension: 0.4,
                    fill: true,
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: true } },
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
    });
}

// Calorie + Diet
function calculateCalories() {
    let age = document.getElementById("age").value;
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weightCal").value;

    let calories = 10*weight + 6.25*height - 5*age + 5;

    document.getElementById("calorieResult").innerText =
        "Daily Calories Needed: " + Math.round(calories);

    let diet = "";
    if(calories < 1800){
        diet = `🥗 Weight Loss Plan:\n• Breakfast: Oats + Apple 🍎\n• Lunch: Brown rice + Chicken/Paneer 🍗\n• Dinner: Salad + Soup 🥣\n• Snacks: Nuts + Green tea`;
    } else if(calories < 2500){
        diet = `⚖️ Maintenance Diet:\n• Breakfast: Idli / Eggs + Milk 🥚\n• Lunch: Rice + Dal + Vegetables 🍛\n• Dinner: Roti + Curry\n• Snacks: Fruits 🍌`;
    } else {
        diet = `💪 Weight Gain Plan:\n• Breakfast: Peanut butter bread + Banana 🍌\n• Lunch: Rice + Chicken / Paneer 🍗\n• Dinner: Chapati + Curry\n• Snacks: Dry fruits + Milk 🥛`;
    }

    document.getElementById("dietPlan").innerText = diet;
}

// BMI & Health Risk
function calculateBMI() {
    let weight = parseFloat(document.getElementById("weightBMI").value);
    let height = parseFloat(document.getElementById("heightBMI").value);

    if (!weight || !height) {
        alert("Please enter both weight and height");
        return;
    }

    fetch("/calculate_bmi", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({weight: weight, height: height})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("bmiResult").innerText = "BMI: " + data.bmi;

        return fetch("/predict_risk", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({bmi: data.bmi})
        });
    })
    .then(res => res.json())
    .then(riskData => {
        document.getElementById("riskResult").innerText = "Health Risk: " + riskData.risk;
    });

    document.getElementById("weightBMI").value = '';
    document.getElementById("heightBMI").value = '';
}

// Load weights on page load
loadWeights();
</script>

</body>
</html>
