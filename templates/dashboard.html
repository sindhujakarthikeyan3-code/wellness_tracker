<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<a href="/logout">Logout</a>

<h2>Add Weight</h2>
<form id="weightForm">
    <input type="number" name="weight" placeholder="Enter weight" required>
    <button type="submit">Add</button>
</form>

<h3>Your Weights:</h3>
<ul id="weightList"></ul>

<h2>BMI Calculator</h2>
<form id="bmiForm">
    Weight: <input type="number" name="weight" required><br>
    Height (cm): <input type="number" name="height" required><br>
    <button type="submit">Calculate BMI</button>
</form>

<p id="bmiResult"></p>

<script>
// Load weights
async function loadWeights() {
    const res = await fetch("/get_weights");
    const data = await res.json();
    const list = document.getElementById("weightList");
    list.innerHTML = "";
    data.forEach(w => {
        const li = document.createElement("li");
        li.innerText = w;
        list.appendChild(li);
    });
}

loadWeights();

// Add weight
document.getElementById("weightForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(this);

    await fetch("/add_weight", {
        method: "POST",
        body: formData
    });

    loadWeights();
});

// BMI
document.getElementById("bmiForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const formData = new FormData(this);

    const res = await fetch("/bmi", {
        method: "POST",
        body: formData
    });

    const data = await res.json();
    document.getElementById("bmiResult").innerText = "BMI: " + data.bmi;
});
</script>

</body>
</html>
