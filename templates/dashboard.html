<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
}

.container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 30px;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card h2 {
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card img {
    width: 80px;
    height: auto;
    margin-bottom: 15px;
}

input, button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 5px 0;
    width: 80%;
}

button {
    background: #00c9a7;
    color: white;
    cursor: pointer;
    font-weight: bold;
    width: 50%;
}

button:hover {
    background: #00a389;
}

canvas {
    margin-top: 15px;
    width: 100% !important;
    height: 300px !important;
}
</style>
</head>

<body>

<div class="container">
<h1>💪 Wellness Tracker Dashboard</h1>

<div class="grid">

<!-- Weight Tracker -->
<div class="card">
<h2>📊 Weight Tracker</h2>
<img src="https://img.icons8.com/color/96/000000/weight-scale.png" alt="Weight Scale">
<input type="number" id="weight" placeholder="Enter weight (kg)">
<button onclick="addWeight()">Add Weight</button>
<canvas id="weightChart"></canvas>
</div>

<!-- Calorie Prediction -->
<div class="card">
<h2>🔥 Calorie Prediction</h2>
<img src="https://img.icons8.com/color/96/000000/fire-element.png" alt="Calories">
<input type="number" id="age" placeholder="Age">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weightCal" placeholder="Weight (kg)">
<button onclick="calculateCalories()">Calculate</button>
<p id="calorieResult"></p>
</div>

<!-- Diet Recommendation -->
<div class="card">
<h2>🥗 Diet Recommendation</h2>
<img src="https://img.icons8.com/color/96/000000/salad.png" alt="Diet">
<p id="dietPlan">Enter details to get diet plan</p>
</div>

<!-- BMI & Health Risk -->
<div class="card">
<h2>🩺 BMI & Health Risk</h2>
<img src="https://img.icons8.com/color/96/000000/heart-health.png" alt="Health">
<input type="number" id="weightBMI" placeholder="Weight (kg)">
<input type="number" id="heightBMI" placeholder="Height (m)">
<button onclick="calculateBMI()">Calculate BMI & Risk</button>
<p id="bmiResult">BMI: -</p>
<p id="riskResult">Health Risk: -</p>
</div>

</div>
</div>

<script>
let chart;

// Add weight
function addWeight() {
    let weight = document.getElementById("weight").value;

    fetch("/add_weight", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({weight: weight})
    }).then(() => loadWeights());
}

// Load weights
function loadWeights() {
    fetch("/get_weights")
    .then(res => res.json())
    .then(data => {
        let weights = data;
        let labels = data.map((_, i) => i + 1);

        if(chart) chart.destroy();

        chart = new Chart(document.getElementById("weightChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Weight Progress (kg)",
                    data: weights,
                    borderColor: '#00c9a7',
                    backgroundColor: 'rgba(0,201,167,0.2)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: true },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
    });
}

// Calorie + Diet
function calculateCalories() {
    let age = document.getElementById("age").value;
    let height = document.getElementById("height").value;
    let weight = document.getElementById("weightCal").value;

    let calories = 10*weight + 6.25*height - 5*age + 5;

    document.getElementById("calorieResult").innerText =
        "Daily Calories Needed: " + Math.round(calories);

    let diet = "";
    if(calories < 1800){
        diet = "🥗 Weight Loss Plan: Breakfast, Lunch, Dinner, Snacks";
    } else if(calories < 2500){
        diet = "⚖️ Maintenance Diet: Breakfast, Lunch, Dinner, Snacks";
    } else {
        diet = "💪 Weight Gain Plan: Breakfast, Lunch, Dinner, Snacks";
    }

    document.getElementById("dietPlan").innerText = diet;
}

// BMI & Health Risk
function calculateBMI() {
    let weight = parseFloat(document.getElementById("weightBMI").value);
    let height = parseFloat(document.getElementById("heightBMI").value);

    if (!weight || !height) {
        alert("Please enter both weight and height");
        return;
    }

    fetch("/calculate_bmi", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({weight: weight, height: height})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("bmiResult").innerText = "BMI: " + data.bmi;
        return fetch("/predict_risk", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({bmi: data.bmi})
        });
    })
    .then(res => res.json())
    .then(riskData => {
        document.getElementById("riskResult").innerText = "Health Risk: " + riskData.risk;
    });

    document.getElementById("weightBMI").value = '';
    document.getElementById("heightBMI").value = '';
}

// Load weights on page load
loadWeights();
</script>

</body>
</html>
